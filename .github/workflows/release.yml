name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.1.17)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: Orchestra-x64.AppImage
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: Orchestra-arm64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libfuse2
          pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm exec electron-rebuild

      - name: Build AppImage
        run: pnpm exec vite build && pnpm exec electron-builder --publish never

      - name: Rename artifact
        run: mv release/Orchestra.AppImage release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  # Native GTK4 frontend — built in a Fedora container with the real -devel
  # packages (the localdeps hack is dev-box-only). Version is already in
  # lockstep: build.rs bakes the repo package.json version into the crate.
  build-gtk:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}
    container:
      image: fedora:42

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ make pkgconf-pkg-config git tar \
            rust cargo \
            gtk4-devel vte291-gtk4-devel glib2-devel cairo-devel \
            cairo-gobject-devel pango-devel gdk-pixbuf2-devel graphene-devel \
            harfbuzz-devel vulkan-loader-devel \
            gtksourceview5-devel \
            webkitgtk6.0-devel libsoup3-devel javascriptcoregtk6.0-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build orchestra-gtk (release)
        working-directory: native
        run: cargo build --release -p orchestra-gtk

      - name: Rename artifact
        run: mv native/target/release/orchestra-gtk release/orchestra-gtk-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-gtk-${{ matrix.arch }}
          path: release/orchestra-gtk-${{ matrix.arch }}
          if-no-files-found: error

  publish:
    needs: [build, build-gtk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Creates release if it doesn't exist (--ci-only mode)
          # Appends to existing release if it does (manual mode)
          files: |
            artifacts/Orchestra-x64.AppImage/Orchestra-x64.AppImage
            artifacts/Orchestra-arm64.AppImage/Orchestra-arm64.AppImage
            artifacts/orchestra-gtk-x64/orchestra-gtk-x64
            artifacts/orchestra-gtk-arm64/orchestra-gtk-arm64
          fail_on_unmatched_files: true
          generate_release_notes: true
